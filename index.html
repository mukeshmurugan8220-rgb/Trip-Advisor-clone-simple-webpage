<!DOCTYPE html>
<html>
<head>
    <title>Trip Advisor Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Trip Advisor</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Hotels</a>
            <a href="#">Restaurants</a>
            <a href="#">Things to Do</a>
            <a href="#">Contact 📱</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Find Your Next Destination</h2>
        <input type="text" placeholder="Search places...">
        <button>Search</button>
    </section>

    <section class="cards">
        <div class="card">
            <img src="images/paris.webp" alt="">
            <h3>Paris</h3>
            <p>Best place for travel and food.</p>
        </div>

        <div class="card">
            <img src="images/dubai.webp" alt="">
            <h3>Dubai</h3>
            <p>Luxury shopping and hotels.</p>
        </div>
    </section>

</body>
</html>
